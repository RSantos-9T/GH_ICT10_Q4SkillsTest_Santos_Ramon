<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>
</head>

<body class="bg-light d-flex flex-column align-items-center justify-content-center vh-100">

    <div class="card shadow p-4" style="width: 450px;">
        <h3 class="text-center mb-4">Attendance Tracker</h3>

        <form>
            <div class="mb-3">
                <label class="form-label fw-bold">Select Month</label>
                <select id="monthOfTheYear" class="form-select">
                    <option value="Jan">January</option>
                    <option value="Feb">February</option>
                    <option value="Mar">March</option>
                    <option value="Apr">April</option>
                    <option value="May">May</option>
                    <option value="Aug">August</option>
                    <option value="Sep">September</option>
                    <option value="Oct">October</option>
                    <option value="Nov">November</option>
                    <option value="Dec">December</option>
                </select>   
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Absences</label>
                <input type="number" id="absences" class="form-control" placeholder="Enter number">
            </div>

            <div class="d-grid">
                <button type="button" py-click="displaying" class="btn btn-primary">submit</button>
            </div>
        </form>

        <div id="output" class="mt-4 text-center"></div>
    </div>

    <script type="py" src="main.py" config='{"packages":["numpy", "matplotlib"]}'></script>
</body>
</html>
